        * {

        .header {
            background-color: rgb(27, 0, 114);

            flex-wrap: wrap;
            justify-content: center;

            border-radius: 40px;
            padding: 20px 40px;

        .profile {

        .mark {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px dotted rgb(0, 255, 42);
            transition: all 0.4s ease;
        }
        .mark:hover {
            transform: scale(1.1);
            border: 3px solid rgb(255, 252, 252);
        }
        .ProfileT {
            margin: 0;
            color: white;
        }
        .logo {
            text-align: center;

            z-index: 1;
        }
        .valed {
            position: relative;
            background-color: blue;
            width: 200px;
            border-radius: 20px;
            height: 80px;
            z-index: 1;
            overflow: hidden;
        }
        .logoImage {
            position: relative;
            width: 200px;
            height: 80px;
            border-radius: 20px;
            transition: all 0.2s ease;

        }
        .valed::before {
            position: absolute;
            content: "";
            top: -10px;
            left: -100px;
            width: 40px;
            height: 100px;
            background-color: rgba(255, 255, 255, 0.313);
            z-index: 2;
            rotate: 18deg;
            backdrop-filter: blur(15px);
            animation: logoAni 2s ease-in-out 3 backwards;
        }
        .fetures {
            margin: 20px auto;

        }
        .link {
            display: inline-block;
            color: rgb(255, 255, 255);

            margin: 20px;
            width: 80px;
            border: 2px solid blue;
            text-align: center;
            transition: all 0.4s ease;
        }
        .link:hover {
            box-shadow: 0 0 10px rgb(255, 255, 255);
            transform: scale(1.1);
        }
        


        @keyframes logoAni {
            0% {
                left: -100px;
            }
